<div class="min-h-screen bg-slate-50 p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    
    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Minha Galeria</h1>
        <p class="text-sm text-slate-500">Gerencie seus arquivos em tempo real</p>
      </div>

      <label class="cursor-pointer bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-100 transition-all flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Nova Foto
        <input 
          type="file" 
          accept="image/*" 
          class="hidden" 
          (change)="onFileSelected($event)" 
        />
      </label>
    </div>

    @if (loading()) {
      <div class="text-center py-12 text-indigo-600 font-medium">
        Carregando galeria...
      </div>
    } @else {
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        
        @for (foto of fotos(); track foto) {
          <div class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all border border-slate-100 group relative">
            
            <img 
              [src]="'http://localhost:3000/arquivo/' + (foto.__filename || foto.filename)" 
              class="w-full h-48 object-cover" 
              alt="Foto da Galeria"
            />
            
            <div class="p-4">
              <p class="text-xs text-slate-400 truncate">{{ foto.__filename || foto.filename }}</p>
              <div class="flex justify-between items-center mt-2">
                <span class="text-xs font-semibold text-slate-500">{{ (foto.size / 1024).toFixed(2) }} KB</span>
                
                <button (click)="deletar(foto)" class="text-red-500 hover:text-red-700 p-1 rounded-lg hover:bg-red-50 transition-all">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                  </svg>
                </button>
              </div>
            </div>

          </div>
        } @empty {
          <div class="col-span-full text-center py-12 text-slate-400">
            Nenhuma foto encontrada. Adicione uma nova!
          </div>
        }

      </div>
    }

  </div>
</div>
